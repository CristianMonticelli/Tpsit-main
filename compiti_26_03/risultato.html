<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Risultato JSON</title>
    <style>
        body{font-family:Arial,sans-serif;margin:16px;background:#fff;color:#000}
        pre{background:#f5f5f5;padding:12px;border:1px solid #ddd;overflow:auto}
        .actions{margin-top:12px}
        .btn{padding:8px 12px;border:1px solid #ccc;background:#eee;cursor:pointer}
    </style>
</head>
<body>
    <h1>Studente - JSON generato</h1>
    <div id="contenuto">
        <p>Nessun dato disponibile.</p>
    </div>

    <div class="actions">
        <button class="btn" onclick="tornaInserimento()">Nuovo inserimento</button>
        <button class="btn" onclick="tornaVisualizza()">Vai a visualizza registro</button>
    </div>

    <script>
        function mostraJSON() {
            const raw = sessionStorage.getItem('ultimoStudente');
            const container = document.getElementById('contenuto');
            if (!raw) {
                container.innerHTML = '<p>Nessun dato disponibile. Ritorna alla pagina di inserimento.</p>';
                return;
            }
            try {
                const obj = JSON.parse(raw);
                const pretty = JSON.stringify(obj, null, 2);
                container.innerHTML = '<pre>' + escapeHtml(pretty) + '</pre>';
            } catch (e) {
                container.innerHTML = '<p>Errore nella visualizzazione del JSON.</p>';
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>"]/g, function(m) {
                return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m];
            });
        }

        function tornaInserimento() { window.location.href = 'inserimento.html'; }
        function tornaVisualizza() { window.location.href = 'visualizza.html'; }

        mostraJSON();
    </script>
</body>
</html>
