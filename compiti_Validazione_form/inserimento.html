<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Inserimento Studente</title>
    <style>
        body{font-family:Arial,sans-serif;background:#fff;color:#000;margin:8px;padding:8px}
        h1{font-size:1.2rem;text-align:center;margin:6px 0}
        .form-container{padding:6px;border:1px solid #fff;background:#fff}
        input,select,button,textarea{display:block;width:100%;margin:6px 0;padding:6px;border:1px solid #ccc;background:#eeeeee;color:#000;font-size:14px}
        input,select{box-sizing:border-box}
        button{background:#eee;border:1px solid #ddd;color:#000;cursor:pointer}
        .btn,.btn-secondary{padding:6px}
        .errore-campo{border:2px solid red !important}
        .error-list{color:red;margin-top:8px;background:#ffecec;padding:8px;border:1px solid #ffbcbc}
        .small{font-size:12px;color:#444}
        
    </style>
</head>
<body>
    <h1> REGISTRAZIONE STUDENTI</h1>
    
    <div class="form-container">
        <form id="formStudente" novalidate>
            <label for="nome">nome</label>
            <input type="text" id="nome" name="nome" required placeholder="Es: Mario">
            
            <label for="cognome">cognome</label>
            <input type="text" id="cognome" name="cognome" required placeholder="Es: Rossi">
            
            <label for="data_nascita">data di nascita</label>
            <input type="date" id="data_nascita" name="data_nascita" required>
            
            <label for="codice_fiscale">codice fiscale</label>
            <input type="text" id="codice_fiscale" name="codice_fiscale" placeholder="Es: RSSMRA85M01H501U" maxlength="16">

            <label for="classe">classe</label>
            <select id="classe" name="classe" required multiple>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

            <label for="sezione">sezione</label>
            <select id="sezione" name="sezione" required multiple>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="G">G</option>
                <option value="H">H</option>
                <option value="I">I</option>

            </select>
            
            <label for="ripetente">ripetente</label>
            <input type="checkbox" id="ripetente" name="ripetente">
            
            <div id="anni_container" style="display:none">
                <label for="anni_ripetuti">anni ripetuti <span class="small">(se ripetente)</span></label>
                <input type="number" id="anni_ripetuti" name="anni_ripetuti" min="0" value="0">
            </div>

            <label for="uscita">uscita</label>
            <select id="uscita" name="uscita" required>
                <option value="">-- Seleziona una uscita --</option>
                <option value="lavoro">lavoro</option>
                <option value="università">università</option>
                <option value="altro">altro</option>
            </select>

            <button type="submit" class="btn">INVIA REGISTRAZIONE</button>
            <button type="button" class="btn btn-secondary" onclick="vaiAVisualizza()">Vai a Visualizza</button>

            <!-- div degli errori posizionato dopo il submit (richiesta della consegna) -->
            <div id="errori" class="error-list" aria-live="polite" style="display:none"></div>
        <script>
            // compatibilità con visualizza.html: key 'registro' con array 'books'
            function caricaRegistro() {
                const registroJSON = localStorage.getItem('registro');
                return registroJSON ? JSON.parse(registroJSON) : { books: [] };
            }
            function salvaRegistro(registro) {
                localStorage.setItem('registro', JSON.stringify(registro, null, 2));
            }

            // utility: toggle visibilità anni ripetuti
            const ripetenteEl = document.getElementById('ripetente');
            const anniContainer = document.getElementById('anni_container');
            const anniInput = document.getElementById('anni_ripetuti');

            function aggiornaVisibilitaAnni() {
                if (ripetenteEl.checked) {
                    anniContainer.style.display = '';
                    anniInput.setAttribute('required', 'required');
                } else {
                    anniContainer.style.display = 'none';
                    anniInput.removeAttribute('required');
                    anniInput.value = '0';
                }
            }

            ripetenteEl.addEventListener('change', aggiornaVisibilitaAnni);
            // inizializza stato
            aggiornaVisibilitaAnni();

            // rimuove bordo rosso quando utente modifica il campo
            ['nome','cognome','data_nascita','codice_fiscale','classe','sezione','anni_ripetuti','uscita','ripetente']
                .forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.addEventListener('input', () => el.classList.remove('errore-campo'));
                    el.addEventListener('change', () => el.classList.remove('errore-campo'));
                });

            // validatori
            function validaNomeCognome(s) {
                const v = s.trim();
                // almeno 2 caratteri, solo lettere (compresi accenti), spazi, apostrofo e trattino
                return /^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,}$/.test(v);
            }

            function calcolaEta(dob) {
                // calcolo semplificato: differenza in anni usando approssimazione solida
                const diff = Date.now() - dob.getTime();
                const anni = Math.floor(diff / (365.25 * 24 * 60 * 60 * 1000));
                return anni;
            }

            // controllo codice fiscale (versione semplificata: solo formato 16 caratteri alfanumerici)
            function validaCodiceFiscale(cf) {
                if (!cf) return false;
                const c = cf.toUpperCase().trim();
                const basic = /^[A-Z0-9]{16}$/;
                return basic.test(c);
            }

            function validaCampi() {
                const errors = [];
                const campos = {
                    nome: document.getElementById('nome'),
                    cognome: document.getElementById('cognome'),
                    data_nascita: document.getElementById('data_nascita'),
                    codice_fiscale: document.getElementById('codice_fiscale'),
                    classe: document.getElementById('classe'),
                    sezione: document.getElementById('sezione'),
                    ripetente: document.getElementById('ripetente'),
                    anni_ripetuti: document.getElementById('anni_ripetuti'),
                    uscita: document.getElementById('uscita')
                };

                // reset stili
                Object.values(campos).forEach(c => c && c.classList && c.classList.remove('errore-campo'));

                // nome, cognome: required, almeno 2 caratteri e solo lettere/segni consentiti
                if (!validaNomeCognome(campos.nome.value || '')) {
                    errors.push({ field: 'nome', message: 'Nome obbligatorio (min 2 lettere, solo lettere/spazi/\'-).' });
                }
                if (!validaNomeCognome(campos.cognome.value || '')) {
                    errors.push({ field: 'cognome', message: 'Cognome obbligatorio (min 2 lettere, solo lettere/spazi/\'-).' });
                }

                // data_nascita: required, nel passato e maggiorenne (>= 18 anni)
                if (!campos.data_nascita.value) {
                    errors.push({ field: 'data_nascita', message: 'Data di nascita obbligatoria.' });
                } else {
                    const d = new Date(campos.data_nascita.value + 'T00:00:00');
                    const oggi = new Date();
                    if (isNaN(d.getTime()) || d >= oggi) {
                        errors.push({ field: 'data_nascita', message: 'Data di nascita non valida (deve essere nel passato).' });
                    } else {
                        const eta = calcolaEta(d);
                        if (eta < 18) {
                            errors.push({ field: 'data_nascita', message: 'Lo studente deve essere maggiorenne (>= 18 anni).' });
                        }
                    }
                }

                // codice fiscale: formato + controllo
                const cf = (campos.codice_fiscale.value || '').trim().toUpperCase();
                if (!validaCodiceFiscale(cf)) {
                    errors.push({ field: 'codice_fiscale', message: 'Codice fiscale non valido. Controlla formato e carattere di controllo.' });
                }

                // classe / sezione / uscita: required
                if (!campos.classe.value) {
                    errors.push({ field: 'classe', message: 'Seleziona una classe.' });
                }
                if (!campos.sezione.value) {
                    errors.push({ field: 'sezione', message: 'Seleziona una sezione.' });
                }
                if (!campos.uscita.value) {
                    errors.push({ field: 'uscita', message: 'Seleziona una uscita.' });
                }

                // ripetente -> anni_ripetuti obbligatorio e >0
                if (campos.ripetente.checked) {
                    const anni = parseInt(campos.anni_ripetuti.value, 10);
                    if (isNaN(anni) || anni <= 0) {
                        errors.push({ field: 'anni_ripetuti', message: 'Se ripetente, inserire anni ripetuti maggiori di 0.' });
                    }
                }

                // applica bordi rossi ai campi invalidi
                errors.forEach(err => {
                    const el = document.getElementById(err.field);
                    if (el) el.classList.add('errore-campo');
                });

                return errors;
            }

            document.getElementById('formStudente').addEventListener('submit', function(e) {
                e.preventDefault();
                const errorDiv = document.getElementById('errori');
                const errors = validaCampi();

                if (errors.length > 0) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '<strong>Correggi i seguenti errori:</strong><ul>' +
                        errors.map(err => `<li><strong>${err.field}</strong>: ${err.message}</li>`).join('') +
                        '</ul>';
                    const primo = document.getElementById(errors[0].field);
                    if (primo) primo.focus();
                    return;
                }

                // costruisci oggetto studente e salva
                const studente = {
                    nome: document.getElementById('nome').value.trim(),
                    cognome: document.getElementById('cognome').value.trim(),
                    data_nascita: document.getElementById('data_nascita').value,
                    codice_fiscale: document.getElementById('codice_fiscale').value.trim().toUpperCase(),
                    classe: document.getElementById('classe').value,
                    sezione: document.getElementById('sezione').value,
                    ripetente: document.getElementById('ripetente').checked,
                    anni_ripetuti: parseInt(document.getElementById('anni_ripetuti').value, 10) || 0,
                    uscita: document.getElementById('uscita').value
                };

                const registro = caricaRegistro();
                registro.books.push(studente);
                salvaRegistro(registro);

                // salvo l'ultimo studente per la pagina risultato
                sessionStorage.setItem('ultimoStudente', JSON.stringify(studente, null, 2));

                errorDiv.style.display = 'none';
                this.reset();
                // assicurati di aggiornare visibilità dopo reset
                aggiornaVisibilitaAnni();

                // redirect a pagina risultato che mostra il JSON
                window.location.href = 'risultato.html';
            });

            function vaiAVisualizza() {
                window.location.href = 'visualizza.html';
            }
        </script>
                
   
    </script>
</body>
</html>
