<!doctype html>
<html lang="it">
<head>
    <title>AJAX esercizio 1</title>
</head>
<body>
    <font color="blue" size="4"><strong>
        Html caricamento dinamico
    </strong></font><br/>
    <hr/>

    <div>
        <button>documento1</button>
        <button>documento2</button>
        <button>documento3</button>
        <button>documento4</button>
    </div>
    <hr/>
    <div id="zonaDinamica">
        <em>qui viene caricato il doc</em>
    </div>
    <hr/>
    <font color="blue" size="3">parte inferiore</font><br/>
<script>
    var documenti = document.getElementsByTagName("button");
    for(var i = 0; i < documenti.length; i++) {
        documenti[i].onclick = caricaDocumento;
    }
    function caricaDocumento(e) {
        var httpRequest = new XMLHttpRequest();
        httpRequest.onreadystatechange = gestisciResponse;
        httpRequest.open("GET", e.target.innerHTML + ".html", true);
        httpRequest.send();
    }
    function gestisciResponse(e) {
        if (e.target.readyState === XMLHttpRequest.DONE) {
            if (e.target.status === 200) {
                document.getElementById("zonaDinamica").innerHTML = e.target.responseText;
            } else {
                document.getElementById("zonaDinamica").innerHTML = "Errore caricamento: " + e.target.status;
            }
        }
    }
</script>
</body>
</html>
